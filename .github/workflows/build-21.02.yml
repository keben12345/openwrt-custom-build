name: Build OpenWrt-21。02-1

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync \
          unzip zlib1g-dev file wget curl
    
    - name: Clone OpenWrt
      run: |
        git clone -b v21.02.7 https://github.com/openwrt/openwrt.git openwrt
    - name: Copy custom files
      run: |
        mkdir -p openwrt/files/etc/init.d
        mkdir -p openwrt/files/etc/hotplug.d/usb
        mkdir -p openwrt/files/usr/share/hp1020
        cp -r files/* openwrt/files/
        chmod +x openwrt/files/etc/init.d/hp1020
        chmod +x openwrt/files/etc/hotplug.d/usb/20-hp1020
    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Run diy script
      run: |
        cd openwrt
        bash ../diy21.sh

    - name: Generate config
      run: |
        bash config.sh
        cd openwrt
        make defconfig

    - name: Build firmware
      run: |
        cd openwrt
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-firmware-21.02-7
        path: openwrt/bin/targets/
