name: Build WR720N v3 16MB-19.07

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:

    # 1️⃣ Checkout 仓库
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone OpenWrt
      run: |
       git clone -b v19.07.10 https://github.com/openwrt/openwrt.git openwrt
    
    - name: Install build dependencies
      run: |
       sudo apt update
       sudo apt install -y \
        build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget \
        python2

    - name: Fix python command
      run: |
       sudo ln -sf /usr/bin/python2 /usr/bin/python

    # 3️⃣ 准备 OpenWrt
    - name: Prepare OpenWrt
      run: |
        cd openwrt
        git checkout v19.07.10
        # 更新 feeds 并安装所有软件包
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        # 复制仓库根目录的 .config1 为 .config
        cp ../.config1 .config
        make defconfig
        # 修改设备模板为 16MB flash
        sed -i 's/\$\(Device\/tplink-4mlzma\)/$(Device\/tplink-16mlzma)/' target/linux/ar71xx/image/tiny-tp-link.mk
        echo 'DEVICE_TITLE := TP-LINK TL-WR720N v3 (16MB flash)' >> target/linux/ar71xx/image/tiny-tp-link.mk

    - name: Download sources
      run: |
        cd openwrt
        make download -j8
   
    # 4️⃣ 编译固件
    - name: Build firmware
      run: |
        cd openwrt
        make -j1 V=s

    # 5️⃣ 保存生成的固件
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: wr720n16mb-firmware
        path: openwrt/bin/targets/ar71xx/tiny/*.bin
