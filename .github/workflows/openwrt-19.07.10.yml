name: Build WR720N v3 OpenWrt 19.07.10 (16MB flash)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone OpenWrt
      run: |
        git clone https://github.com/openwrt/openwrt.git
        cd openwrt
        git checkout v19.07.10

    - name: Prepare WR720N v3 16MB
      run: |
        cd openwrt
        # 修改设备模板为 16MB flash
        sed -i 's/\$\(Device\/tplink-4mlzma\)/$(Device\/tplink-16mlzma)/' target/linux/ar71xx/image/tiny-tp-link.mk
        echo 'DEVICE_TITLE := TP-LINK TL-WR720N v3 (16MB flash)' >> target/linux/ar71xx/image/tiny-tp-link.mk
        # 可选：修改 rootfs 镜像大小
        sed -i 's/IMAGE_SIZE := 3840k/IMAGE_SIZE := 15872k/' target/linux/ar71xx/image/common-tp-link.mk

    - name: Check files
      run: |
        pwd
        ls -al ../
        ls -al
    - name: Load config
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        cp ../.config1 .config
        make defconfig

    - name: Download sources
      run: make download -j8

    - name: Build firmware
      run: make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: WR720N-16MB
        path: bin/targets/
