name: Build WR703N 16MB OpenWrt-21.02.7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone OpenWrt
      run: |
        git clone -b v21.02.7 https://github.com/openwrt/openwrt.git openwrt
    - name: Copy custom files
      run: |
        mkdir -p openwrt/files/etc/init.d
        mkdir -p openwrt/files/etc/hotplug.d/usb
        mkdir -p openwrt/files/usr/share/hp1020
        cp -r files/* openwrt/files/
        chmod +x openwrt/files/etc/init.d/hp1020
        chmod +x openwrt/files/etc/hotplug.d/usb/20-hp1020    
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Modify for 16MB flash (WR703N)
      run: |
        cd openwrt

        # 修改 WR703N 为 16MB flash
        sed -i 's/$(Device\/tplink-4mlzma)/$(Device\/tplink-16mlzma)/g' target/linux/ath79/image/tiny-tp-link.mk
        # 修改eth0 mac地址
        # sed -i '/&eth0 {/,/};/ s#0x1fc00#0x124e0#' target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
        sed -i '/&eth0 {/,/};/ s#mtd-mac-address = <&uboot 0x1fc00>;#mtd-mac-address = <&uboot 0x124e0>;\
        \tmac-address-increment = <0>;#' \
        target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
        # 2. eth1 MAC
        sed -i '/&eth1 {/,/};/ s/status = "okay";/status = "okay";\
        \tmac-address-increment = <1>;/' \
        target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
        # 3. 开启双口
        sed -i '/gmac-config {/,/};/ s#switch-phy-addr-swap = <0>#switch-phy-addr-swap = <1>#' target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
        sed -i '/gmac-config {/,/};/ s#switch-phy-swap = <0>#switch-phy-swap = <1>#' target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
        # 修改 DTS 分区为 16MB
        sed -i 's/0x3d0000/0xfd0000/g' target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
        sed -i 's/0x3f0000/0xff0000/g' target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
        # 加入 USB GPIO 供电
        sed -i '/enable-active-high;/a\        gpios = <\&gpio 8 GPIO_ACTIVE_HIGH>;\n        regulator-always-on;' \
        target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
        # Fix USB
        sed -i 's/"chipidea,usb2"/"generic-ehci"/g' target/linux/ath79/dts/ar9330.dtsi
        sed -i '/usb@1b000000 {/a\        has-transaction-translator;\n        caps-offset = <0x100>;' target/linux/ath79/dts/ar9330.dtsi
        sed -i '/usb@1b000000 {/,/};/ s/status = "disabled"/status = "okay"/' target/linux/ath79/dts/ar9330.dtsi
    - name: Load config
      run: |
        cd openwrt
        cat > .config <<EOF
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_tiny=y
        CONFIG_TARGET_ath79_tiny_DEVICE_tplink_tl-wr703n=y
        CONFIG_PACKAGE_luci=y
        CONFIG_LUCI_LANG_zh_Hans=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_PACKAGE_luci-app-ttyd=y
        CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y
        CONFIG_PACKAGE_kmod-usb-core=y
        CONFIG_PACKAGE_kmod-usb-ohci=y
        CONFIG_PACKAGE_kmod-usb2=y
        # USB 打印
        CONFIG_PACKAGE_kmod-usb-printer=y
        CONFIG_PACKAGE_p910nd=y
        CONFIG_PACKAGE_luci-app-p910nd=y
        CONFIG_PACKAGE_luci-i18n-p910nd-zh-cn=y
        CONFIG_PACKAGE_usbutils=y
        CONFIG_PACKAGE_luci-app-opkg=y
        EOF

        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j8

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-WR703N-16MB
        path: openwrt/bin/targets/
