name: Build WR703N 16MB OpenWrt-21.02.7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone OpenWrt
      run: |
        git clone -b v21.02.7 https://github.com/openwrt/openwrt.git openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Modify for 16MB flash (WR703N)
      run: |
        cd openwrt

        # 修改 WR703N 为 16MB flash
        sed -i 's/$(Device\/tplink-4mlzma)/$(Device\/tplink-16mlzma)/g' target/linux/ath79/image/tiny-tp-link.mk

        # 修改 DTS 分区为 16MB
        sed -i 's/0x3d0000/0xfd0000/g' target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
        sed -i 's/0x3f0000/0xff0000/g' target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
        # 加入 USB GPIO 供电
        sed -i 's/regulator-max-microvolt = <5000000>;/regulator-max-microvolt = <5000000>;\
        \tgpio = <\&gpio 6 GPIO_ACTIVE_HIGH>;/' target/linux/ath79/dts/ar9331_tplink_tl-wr703n_tl-mr10u.dtsi
    - name: Load config
      run: |
        cd openwrt
        cat > .config <<EOF
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_tiny=y
        CONFIG_TARGET_ath79_tiny_DEVICE_tplink_tl-wr703n=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_PACKAGE_luci-app-ttyd=y
        CONFIG_PACKAGE_kmod-usb-core=y
        CONFIG_PACKAGE_kmod-usb2=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_block-mount=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        EOF

        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j8

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-WR703N-16MB
        path: openwrt/bin/targets/
