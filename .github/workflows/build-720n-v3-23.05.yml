name: Build WR720N v3 OpenWrt-23.05

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev \
        libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone OpenWrt
      run: |
         git clone https://github.com/openwrt/openwrt.git
         cd openwrt
         git checkout v21.02.7
         # git clone --depth 1 --branch v23.05.6 https://github.com/openwrt/openwrt
         # git clone --branch v23.05.0 https://github.com/openwrt/openwrt
    
    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
    - name: Run DIY script
      run: |
        chmod +x diy1.sh
        ./diy1.sh

    - name: Generate config
      run: |
        chmod +x config.sh
        ./config.sh
        cd openwrt
        make defconfig

    
    - name: Build firmware
      run: |
        cd openwrt
        make -j$(nproc) download
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: wr720n-v3-firmware
        path: openwrt/bin/targets/ath79/generic/
