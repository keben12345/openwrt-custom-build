name: openwrt-build-github-actions

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [ "ath79/tiny/tplink_tl-wr720n-v3" ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential g++ flex bison gawk gettext git libncurses-dev \
            libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file wget tree

      - name: Clone OpenWrt source
        run: |
          git clone -b ${{ github.ref_name }} https://github.com/openwrt/openwrt.git
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate DTS and .config
        run: bash config.sh

      - name: Apply defconfig
        working-directory: openwrt
        run: make defconfig

      - name: Build firmware
        working-directory: openwrt
        run: make -j$(nproc) V=s

      - name: Collect artifacts
        run: |
          mkdir -p ../bin
          cp openwrt/bin/targets/*/*.bin ../bin/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: bin/*
          retention-days: 3
