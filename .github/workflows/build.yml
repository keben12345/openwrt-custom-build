name: Build OpenWrt WR710N USB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential git libncurses5-dev zlib1g-dev gawk \
            flex gettext wget unzip python3 python3-distutils

      - name: Run build script
        run: bash build.sh v22.03.5 ath79/generic/tplink_tl-wr710n-usb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-wr710n-usb
          path: openwrt/bin/targets/ath79/generic/
