name: openwrt-build-github-actions

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential g++ git libncurses5-dev zlib1g-dev \
            python3-distutils unzip wget rsync bc ccache

      - name: build
        run: |
          bash build.sh v22.03.5 ath79/tiny/tplink_tl-wr720n-v3

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-wr720n-v3
          path: openwrt/bin/targets/ath79/tiny/*
