name: build-openwrt

on:
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-22.04

    steps:

    - name: checkout
      uses: actions/checkout@v4

    - name: install deps
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev \
        libssl-dev python3 python3-setuptools rsync unzip \
        zlib1g-dev file wget

    - name: build
      run: |
        VERSION=$(cat version.txt)
        TARGET=$(cat targets.txt)
        bash build.sh $VERSION $TARGET

    - name: upload
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-firmware
        path: openwrt/bin/targets
