name: Build OpenWrt WR720N MOD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential clang flex bison g++ gawk gcc-multilib \
        gettext git libncurses-dev libssl-dev python3 python3-distutils \
        rsync unzip zlib1g-dev file wget

    - name: Build firmware
      run: |
        chmod +x build.sh config.sh
        ./build.sh v22.03.5

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: wr720n-mod-firmware
        path: openwrt/bin/targets/ath79/generic/*
