name: OpenWrt WR720N-v3 Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt version'
        default: 'v22.03.5'

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      OPENWRT_VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gcc git gettext libncurses-dev \
            libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file wget curl bc

      - name: Start build
        run: |
          chmod +x build.sh config.sh
          ./build.sh $OPENWRT_VERSION

      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wr720n-firmware
          path: openwrt/bin/targets/ath79/generic/*
