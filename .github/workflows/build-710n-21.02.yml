name: Build OpenWrt-710n-v21.02.7

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Clone OpenWrt
      run: |
        git clone https://github.com/openwrt/openwrt.git
        cd openwrt
        git checkout v21.02.7

    - name: Copy custom files
      run: |
        mkdir -p openwrt/files/etc/init.d
        mkdir -p openwrt/files/etc/hotplug.d/usb
        mkdir -p openwrt/files/usr/share/hp1020
        cp -r files/* openwrt/files/
        chmod +x openwrt/files/etc/init.d/hp1020
        chmod +x openwrt/files/etc/hotplug.d/usb/20-hp1020    
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Run diy script
      run: |
        cd openwrt
        bash ../diy25.sh

    - name: Generate config
      run: |
        bash config1.sh
        cd openwrt
        make defconfig

    - name: Build firmware
      run: |
        cd openwrt
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-firmware-710n-21.02
        path: openwrt/bin/targets/
